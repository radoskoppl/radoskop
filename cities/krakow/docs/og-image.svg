<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="8" fill="#7c3aed"/>

  <!-- Logo -->
  <rect x="60" y="60" width="56" height="56" rx="12" fill="#7c3aed"/>
  <text x="88" y="100" font-family="system-ui,sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle">R</text>

  <!-- Title -->
  <text x="136" y="100" font-family="system-ui,sans-serif" font-size="32" font-weight="700" fill="#1a1d27">
    Radoskop <tspan fill="#7c3aed">Kraków</tspan>
  </text>

  <!-- Subtitle -->
  <text x="60" y="170" font-family="system-ui,sans-serif" font-size="28" fill="#6b7280">
    Monitoring Rady Miasta Krakowa
  </text>

  <!-- Stats boxes -->
  <rect x="60" y="220" width="320" height="120" rx="16" fill="white" stroke="#e2e5e9" stroke-width="1"/>
  <text x="220" y="268" font-family="system-ui,sans-serif" font-size="42" font-weight="700" fill="#7c3aed" text-anchor="middle">47</text>
  <text x="220" y="316" font-family="system-ui,sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">radnych</text>

  <rect x="420" y="220" width="320" height="120" rx="16" fill="white" stroke="#e2e5e9" stroke-width="1"/>
  <text x="580" y="268" font-family="system-ui,sans-serif" font-size="42" font-weight="700" fill="#7c3aed" text-anchor="middle">1144</text>
  <text x="580" y="316" font-family="system-ui,sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">glosowan</text>

  <rect x="780" y="220" width="320" height="120" rx="16" fill="white" stroke="#e2e5e9" stroke-width="1"/>
  <text x="940" y="268" font-family="system-ui,sans-serif" font-size="42" font-weight="700" fill="#7c3aed" text-anchor="middle">39</text>
  <text x="940" y="316" font-family="system-ui,sans-serif" font-size="18" fill="#6b7280" text-anchor="middle">sesji</text>

  <!-- Tagline -->
  <text x="60" y="420" font-family="system-ui,sans-serif" font-size="24" fill="#1a1d27">
    Sprawdz jak glosuja radni w Twoim miescie
  </text>
  <text x="60" y="460" font-family="system-ui,sans-serif" font-size="20" fill="#6b7280">
    Frekwencja · Glosowania · Budzet · Uchwaly · Interpelacje
  </text>

  <!-- URL -->
  <rect x="0" y="530" width="1200" height="100" fill="#7c3aed" opacity="0.05"/>
  <text x="60" y="580" font-family="system-ui,sans-serif" font-size="24" font-weight="600" fill="#7c3aed">
    kraków.radoskop.pl
  </text>

  <!-- Open data badge -->
  <text x="1140" y="580" font-family="system-ui,sans-serif" font-size="16" fill="#6b7280" text-anchor="end">
    Otwarte dane · AGPL-3.0 · radoskop.pl
  </text>
</svg>